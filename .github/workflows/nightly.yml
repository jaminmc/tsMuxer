name: Nightly Releases

on:
  schedule:
    - cron:  '1 1 * * *'

jobs:
  check:
    runs-on: ubuntu-latest
    
    outputs:
      status: ${{ steps.check.outputs.status }}
      version: ${{ steps.check.outputs.version }}
      skip_reason: ${{ steps.check.outputs.skip_reason }}
    
    steps:
    - uses: actions/checkout@v4
      name: checkout
      with:
        fetch-depth: 0
    
    - name: nightly-check
      id: check
      shell: bash {0}
      run: |
        set -e
        
        # Check if HEAD already has a nightly tag
        if git describe --tags --contains --match 'nightly-*' HEAD >/dev/null 2>&1; then
          # HEAD already tagged, skip build
          echo "status=1" >> $GITHUB_OUTPUT
          echo "skip_reason=HEAD already has nightly tag" >> $GITHUB_OUTPUT
          echo "::notice::Skipping nightly build - HEAD already has nightly tag"
          exit 0
        else
          # New code since last nightly, proceed with build
          ver="$(date +%Y-%m-%d-%H-%M-%S)"
          echo "status=0" >> $GITHUB_OUTPUT
          echo "version=${ver}" >> $GITHUB_OUTPUT
          echo "skip_reason=" >> $GITHUB_OUTPUT
          echo "::notice::Building nightly for version: ${ver}"
          exit 0
        fi

    - name: create-release
      id: create
      if: steps.check.outputs.status == 0
      uses: softprops/action-gh-release@v2
      with:
        tag_name: nightly-${{ steps.check.outputs.version }}
        name: Nightly build from ${{ steps.check.outputs.version }}
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Log workflow status
      if: always()
      run: |
        if [ "${{ steps.check.outputs.status }}" == "0" ]; then
          echo "::notice::Nightly check passed, proceeding to build"
        else
          echo "::notice::Nightly check skipped: ${{ steps.check.outputs.skip_reason }}"
        fi
  
  build-docker:
  
    needs: check

    if: needs.check.outputs.status == 0
  
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      name: checkout

    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo rm -rf /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force

    - name: Pull Docker image
      run: docker pull jaminmc/tsmuxer_build:latest
      
    - run: rm -f bin/.gitkeep
      name: clean-bin-folder
      
    - name: build-for-linux
      run: >
        docker run --rm
        -v ${{ github.workspace }}:/work -w /work
        jaminmc/tsmuxer_build:latest
        ./scripts/rebuild_linux_with_gui_docker.sh
      
    - name: build-for-win64
      run: >
        docker run --rm
        -v ${{ github.workspace }}:/work -w /work
        jaminmc/tsmuxer_build:latest
        ./scripts/rebuild_mxe_with_gui_docker.sh
      
    - name: build-for-win32
      run: >
        docker run --rm
        -v ${{ github.workspace }}:/work -w /work
        jaminmc/tsmuxer_build:latest
        ./scripts/rebuild_mxe32_with_gui_docker.sh

    - name: build-for-mac
      run: >
        docker run --rm
        -v ${{ github.workspace }}:/work -w /work
        jaminmc/tsmuxer_build:latest
        ./scripts/rebuild_osxcross_with_gui_docker.sh

    - name: Upload All Builds
      id: upload-builds
      uses: softprops/action-gh-release@v2
      with:
        files: ./bin/*.zip
        tag_name: nightly-${{ needs.check.outputs.version }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}        
